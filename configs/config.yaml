# Javis-DB-Agent 主配置
app_name: Javis-DB-Agent
app_version: v1.0
debug: false

# API服务
api:
  host: 0.0.0.0
  port: 8000

# LLM - Ollama
ollama:
  base_url: http://localhost:11434
  # 可用模型: glm4:latest (5.4GB, 快速验证), qwen3.5:35b (35B, 高质量推理)
  # R4: 使用 qwen3.5:35b 作为主要推理模型
  model: qwen3.5:35b
  timeout: 120

# Javis-DB-Agent API 模式配置
# use_mock: true  使用Mock（本地开发测试）
# use_mock: false 使用真实API
javis_api:
  base_url: http://localhost:18080
  timeout: 30
  use_mock: true   # ← 切换开关：true=Mock, false=Real

# Javis-DB-Agent 真实API配置（use_mock=false时生效）
javis_real_api:
  base_url: https://javis-db.example.com/api/v1
  timeout: 30
  # 认证方式: "api_key" | "oauth2"
  auth_type: api_key
  # API Key方式
  api_key: ""
  api_key_header: X-API-Key  # 或 Authorization (ApiKey前缀)
  # OAuth2方式
  oauth_token_url: https://javis-db.example.com/oauth/token
  oauth_authorize_url: https://javis-db.example.com/oauth/authorize
  oauth_client_id: ""
  oauth_client_secret: ""
  oauth_scope: read write
  max_retries: 3

# 数据库
database:
  db_path: data/javis_db_agent.db
  audit_db_path: data/audit.db

# Redis
redis:
  url: redis://localhost:6379/0

# ChromaDB (向量数据库)
chroma:
  db_path: data/chroma

# 知识库路径
knowledge:
  base_path: knowledge/
  alert_rules: knowledge/alert_rules.yaml
  sop_path: knowledge/sop/
  cases_path: knowledge/cases/

# 安全策略
security:
  # L4及以上是否需要审批
  require_approval_l4: true
  # L5是否需要双人审批
  require_dual_approval_l5: true
