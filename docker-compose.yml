# ============================================================
# Javis-DB-Agent docker-compose.yml
# 包含: Javis Agent + Redis + (可选) Ollama
# ============================================================

services:
  # ---- Javis DB Agent ----
  javis-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: javis-agent
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # 应用配置
      - ZLOUD_APP_NAME=Javis-DB-Agent
      - ZLOUD_APP_VERSION=1.3.1
      - ZLOUD_DEBUG=false

      # LLM - Ollama
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=glm4:latest
      - OLLAMA_TIMEOUT=60

      # 数据库
      - DATA_DIR=/app/data
      - DB_PATH=data/javis_db_agent.db
      - AUDIT_DB_PATH=data/audit.db

      # Redis
      - REDIS_URL=redis://redis:6379/0

      # ChromaDB
      - CHROMA_DB_PATH=/app/data/chroma

      # API
      - API_HOST=0.0.0.0
      - API_PORT=8000

      # 安全
      - ZLOUD_VERIFY_SSL=false
      - ZLOUD_OLLAMA_VERIFY_SSL=false

      # 企业微信 (按需配置)
      - WECOM_ENABLED=false

    volumes:
      # 持久化数据
      - javis-data:/app/data
      - javis-logs:/app/logs
      # 知识库
      - ./knowledge:/app/knowledge:ro
      # 配置
      - ./configs:/app/configs:ro
      # .env 文件 (包含密钥)
      - ./.env:/app/.env:ro
    depends_on:
      redis:
        condition: service_healthy
      # ollama:
      #   condition: service_healthy
    networks:
      - javis-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: javis-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - javis-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ---- Ollama (可选，本地运行推荐在宿主机安装) ----
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: javis-ollama
  #   restart: unless-stopped
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama-data:/root/.ollama
  #   networks:
  #     - javis-net
  #   # 加载模型 (可选，取消注释以自动加载)
  #   # deploy:
  #   #   resources:
  #   #     reservations:
  #   #       devices:
  #   #         - driver: nvidia
  #   #           count: all
  #   #           capabilities: [gpu]
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:11434/api/version"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3

# ---- Networks ----
networks:
  javis-net:
    driver: bridge

# ---- Volumes ----
volumes:
  javis-data:
    driver: local
  javis-logs:
    driver: local
  redis-data:
    driver: local
  ollama-data:
    driver: local
